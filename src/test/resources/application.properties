spring.application.name=notification-service

# Tests run against an in-memory H2 database instead of Postgres, so the
# build doesn't depend on local/CI infrastructure being available.
spring.datasource.url=jdbc:h2:mem:notification_service;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

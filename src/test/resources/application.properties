spring.application.name=notification-service

# Tests run against an in-memory H2 database instead of Postgres, so the
# build doesn't depend on local/CI infrastructure being available.
spring.datasource.url=jdbc:h2:mem:notification_service;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dummy values so EmailNotificationSender's @Value placeholder resolves and
# JavaMailSenderImpl auto-configures - no network connection happens just
# from building the bean, only when .send() is actually called.
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=test-password
